<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Library untuk PDF & Jarvis -->

<nav class="navbar">
    <a href="../index.html">🏠 Home</a>
    <a href="form.html">📝 Form Input</a>

<div class="container">
    <div class="filter-card">
        <label style="font-size: 11px; font-weight: bold; display: block; margin-bottom: 5px;">FILTER TANGGAL:</label>
        <input type="date" id="f-date" onchange="updateUI()" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; margin-bottom: 10px;">
        <button class="btn-action btn-print" id="print-btn" onclick="triggerPrint()" disabled>🖨️ Cetak Terpilih (0)</button>
        <button class="btn-action btn-download" id="wa-btn" onclick="triggerPDF()" disabled>💾 Download File (PDF) (0)</button>
    </div>
    <div id="history-list"></div>
</div>

<div class="sticky-ad-footer">
    <ins class="adsbygoogle"
         style="display:inline-block;width:320px;height:50px"
         data-ad-client="ca-pub-2642522351768171"
         data-ad-slot="7918954512"></ins>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</div>

<div id="print-area"><div id="print-content-target"></div></div>

<button id="btn-mute-toggle" onclick="Jarvis.toggleMute()" style="display: none; position: fixed; bottom: 20px; right: 20px; z-index: 99999; background: #e74c3c; color: white; border: none; padding: 10px 15px; border-radius: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 11px; cursor: pointer; font-weight: bold;">🔇 Matikan Suara</button>
